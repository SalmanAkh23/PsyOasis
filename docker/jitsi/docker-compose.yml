version: '3'

services:
  prosody:
    image: jitsi/prosody:latest
    restart: unless-stopped
    expose:
      - '5222'
      - '5280'
    networks:
      - jitsi
    volumes:
      - ${CONFIG}/prosody:/config:Z
    environment:
      - TZ=${TZ}
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_RECORDER_DOMAIN=${XMPP_RECORDER_DOMAIN}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}

  jicofo:
    image: jitsi/jicofo:latest
    restart: unless-stopped
    networks:
      - jitsi
    volumes:
      - ${CONFIG}/jicofo:/config:Z
    environment:
      - TZ=${TZ}
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
    depends_on:
      - prosody

  jvb:
    image: jitsi/jvb:latest
    restart: unless-stopped
    ports:
      - '${JVB_PORT}:${JVB_PORT}/udp'
      - '${JVB_TCP_PORT}:${JVB_TCP_PORT}'
    networks:
      - jitsi
    volumes:
      - ${CONFIG}/jvb:/config:Z
    environment:
      - TZ=${TZ}
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JVB_BREWERY_MUC=jvbbrewery
      - JVB_PORT=${JVB_PORT}
      - JVB_TCP_PORT=${JVB_TCP_PORT}
      - JVB_STUN_SERVERS=${JVB_STUN_SERVERS}
      - JVB_ENABLE_APIS=${JVB_ENABLE_APIS}
    depends_on:
      - prosody

  web:
    image: jitsi/web:latest
    restart: unless-stopped
    ports:
      - '${HTTP_PORT}:80'
    networks:
      - jitsi
    volumes:
      - ${CONFIG}/web:/config:Z
      - ${CONFIG}/prosody:/prosody-config:Z
    environment:
      - TZ=${TZ}
      - XMPP_DOMAIN=${XMPP_DOMAIN}
      - XMPP_AUTH_DOMAIN=${XMPP_AUTH_DOMAIN}
      - XMPP_GUEST_DOMAIN=${XMPP_GUEST_DOMAIN}
      - XMPP_MUC_DOMAIN=${XMPP_MUC_DOMAIN}
      - XMPP_INTERNAL_MUC_DOMAIN=${XMPP_INTERNAL_MUC_DOMAIN}
      - XMPP_RECORDER_DOMAIN=${XMPP_RECORDER_DOMAIN}
      - JICOFO_COMPONENT_SECRET=${JICOFO_COMPONENT_SECRET}
      - JICOFO_AUTH_PASSWORD=${JICOFO_AUTH_PASSWORD}
      - JVB_AUTH_PASSWORD=${JVB_AUTH_PASSWORD}
      - JIGASI_XMPP_PASSWORD=${JIGASI_XMPP_PASSWORD}
      - ENABLE_AUTO_UPGRADE=${ENABLE_AUTO_UPGRADE}
      - PUBLIC_URL=${PUBLIC_URL}
      - DOCKER_HOST_ADDRESS=${DOCKER_HOST_ADDRESS}
      - ENABLE_LETSENCRYPT=${ENABLE_LETSENCRYPT}
      - ENABLE_HTTP_REDIRECT=${ENABLE_HTTP_REDIRECT}
    depends_on:
      - prosody
      - jicofo
      - jvb

networks:
  jitsi:
    driver: bridge
